[workspace]
channels = ["conda-forge"]
name = "cellspots"
platforms = ["linux-64", "osx-arm64", "win-64"]

[environments]
cellspots = { features = ["cellspots"], no-default-feature = true }

[feature.cellspots.system-requirements]
cuda = "12.0"

[feature.cellspots.target.linux-64.dependencies]
pytorch-gpu = "*"
cuda-version = "12.6*"

[feature.cellspots.target.osx-arm64.dependencies]
pytorch = "*"

[feature.cellspots.target.win-64.dependencies]
pytorch-gpu = "*"
cuda-version = "12.6*"

[feature.cellspots.target.linux-64.pypi-dependencies]
pyics = { url = "https://github.com/guiwitz/pyics/releases/download/v1.0.0/pyics-1.0.0-cp312-cp312-manylinux_2_17_x86_64.manylinux2014_x86_64.whl"}

[feature.cellspots.target.osx-arm64.pypi-dependencies]
pyics = { url = "https://github.com/guiwitz/pyics/releases/download/v1.0.0/pyics-1.0.0-cp312-cp312-macosx_14_0_universal2.whl"}

[feature.cellspots.target.win-64.pypi-dependencies]
pyics = { url = "https://github.com/guiwitz/pyics/releases/download/v1.0.0/pyics-1.0.0-cp312-cp312-win_amd64.whl" }

[feature.cellspots]
channels = ["conda-forge"]

[feature.cellspots.dependencies]
python = "3.12.*"
napari = "*"
pyqt = "*"
napari-skimage = "*"
jupyterlab = "*"
numpy = "*"
pip = "*"
vedo = "*"
seaborn = "*"
open3d = ">=0.19.0,<0.20"

[feature.cellspots.pypi-dependencies]
spotiflow = "*"
napari-spotiflow = "*"
ndevio = "*"
bioio-czi = "*"
bioio-dv = "*"
bioio-nd2 = "*"
bioio-lif = "*"
bioio-bioformats = "*"
cellpose = "<4"
napari-cellspots = { git = "https://github.com/guiwitz/napari-cellspots.git" }